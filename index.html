<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTAITE MAX 10 - 新人歌い手発掘ツール</title>
    <!-- OGP Tags for GitHub Pages -->
    <meta property="og:title" content="UTAITE MAX 10">
    <meta property="og:description" content="新人・小中学生歌い手を爆速で発掘するツール">
    <meta property="og:type" content="website">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: 'sans-serif';
        }
        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
        }
        .btn-search {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }
        .btn-search:disabled {
            background: #334155;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .tag-active {
            background-color: #ef4444 !important;
            color: white !important;
            border-color: #ef4444 !important;
        }
        /* 操作不能時のスタイル */
        .ui-disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.5);
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.25rem;
        }
        .video-card:hover .thumb-overlay {
            opacity: 1;
        }
        .video-card:hover img {
            transform: scale(1.05);
        }
        .loader {
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-5xl font-extrabold mb-2 text-red-500 tracking-tighter italic">UTAITE MAX 10</h1>
            <p class="text-gray-400 font-medium text-sm md:text-base">GitHub Pages対応版：1回最大10件の爆速発掘</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <aside class="lg:col-span-1 space-y-6">
                <div id="search-controls" class="card rounded-2xl p-5 shadow-2xl sticky top-8 transition-all duration-300">
                    <h2 class="text-lg font-bold mb-4 border-b border-slate-700 pb-2 flex items-center gap-2 text-red-400">
                        発掘条件
                    </h2>
                    
                    <div class="mb-6">
                        <label class="block text-[10px] font-bold uppercase tracking-widest mb-3 text-slate-500">属性</label>
                        <div class="flex flex-wrap gap-2" id="age-tags">
                            <button onclick="toggleTag(this, '小学生')" class="tag-btn px-3 py-1.5 rounded-lg bg-slate-800 border border-slate-700 text-xs hover:bg-slate-700 transition-all">小学生</button>
                            <button onclick="toggleTag(this, '中学生')" class="tag-btn px-3 py-1.5 rounded-lg bg-slate-800 border border-slate-700 text-xs hover:bg-slate-700 transition-all">中学生</button>
                            <button onclick="toggleTag(this, 'JC')" class="tag-btn px-3 py-1.5 rounded-lg bg-slate-800 border border-slate-700 text-xs hover:bg-slate-700 transition-all">JC</button>
                            <button onclick="toggleTag(this, 'JS')" class="tag-btn px-3 py-1.5 rounded-lg bg-slate-800 border border-slate-700 text-xs hover:bg-slate-700 transition-all">JS</button>
                            <button onclick="toggleTag(this, '新人歌い手')" class="tag-btn px-3 py-1.5 rounded-lg bg-slate-800 border border-slate-700 text-xs hover:bg-slate-700 transition-all">新人</button>
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-[10px] font-bold uppercase tracking-widest mb-3 text-slate-500">声質</label>
                        <div class="flex flex-wrap gap-2" id="voice-tags">
                            <button onclick="toggleTag(this, 'ショタボ')" class="tag-btn px-3 py-1.5 rounded-lg bg-slate-800 border border-slate-700 text-xs hover:bg-slate-700">ショタボ</button>
                            <button onclick="toggleTag(this, 'カワボ')" class="tag-btn px-3 py-1.5 rounded-lg bg-slate-800 border border-slate-700 text-xs hover:bg-slate-700">カワボ</button>
                            <button onclick="toggleTag(this, '地声')" class="tag-btn px-3 py-1.5 rounded-lg bg-slate-800 border border-slate-700 text-xs hover:bg-slate-700">地声</button>
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-[10px] font-bold uppercase tracking-widest mb-2 text-slate-500">追加キーワード</label>
                        <input type="text" id="custom-word" placeholder="曲名や特定のワード" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm focus:ring-1 focus:ring-red-500 outline-none transition-all">
                    </div>

                    <button onclick="startNewSearch()" id="search-btn" class="btn-search w-full py-4 rounded-xl font-bold shadow-lg hover:brightness-110 active:scale-95 transition-all flex items-center justify-center gap-3">
                        <span>新しく発掘する</span>
                        <div id="btn-loader" class="loader hidden"></div>
                    </button>
                </div>
            </aside>

            <main class="lg:col-span-3">
                <div id="results-status" class="mb-6 text-sm font-medium text-slate-400 bg-slate-800/50 inline-block px-4 py-1 rounded-full">
                    条件を選択して検索してください
                </div>
                
                <div id="video-results" class="video-grid"></div>

                <div id="load-more-container" class="mt-10 mb-20 hidden text-center">
                    <button onclick="loadMore()" id="load-more-btn" class="px-10 py-3 bg-slate-800 border border-slate-700 rounded-full text-sm font-bold hover:bg-slate-700 transition-all inline-flex items-center gap-2">
                        <span>さらに10件発掘する</span>
                        <div id="more-loader" class="loader hidden"></div>
                    </button>
                </div>

                <div id="empty-state" class="flex flex-col items-center justify-center py-20 text-slate-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <p id="empty-text">ここに検索結果が表示されます</p>
                </div>
            </main>
        </div>
    </div>

    <script>
        const selectedTags = new Set();
        // ★重要★ ここにご自身のGemini APIキーを入力してください
        const apiKey = "AQ.Ab8RN6KE_q_eVlLc9Zjg3MoD7o1FIGYIsFpKT01W7TNY5bUqZw"; 
        let currentPage = 1;
        let isSearching = false;

        function toggleTag(el, tag) {
            if (isSearching) return;
            if (selectedTags.has(tag)) {
                selectedTags.delete(tag);
                el.classList.remove('tag-active');
            } else {
                selectedTags.add(tag);
                el.classList.add('tag-active');
            }
        }

        function setUILock(locked) {
            isSearching = locked;
            const controls = document.getElementById('search-controls');
            const searchBtn = document.getElementById('search-btn');
            const loadMoreBtn = document.getElementById('load-more-btn');
            const inputs = controls.querySelectorAll('input, button');

            if (locked) {
                controls.classList.add('ui-disabled');
                searchBtn.disabled = true;
                loadMoreBtn.disabled = true;
                inputs.forEach(el => el.disabled = true);
            } else {
                controls.classList.remove('ui-disabled');
                searchBtn.disabled = false;
                loadMoreBtn.disabled = false;
                inputs.forEach(el => el.disabled = false);
            }
        }

        function showSkeletons(append = false) {
            const resultsDiv = document.getElementById('video-results');
            const skeletons = Array(6).fill(0).map(() => `
                <div class="card rounded-xl overflow-hidden flex flex-col h-64 skeleton-item">
                    <div class="skeleton h-36 w-full"></div>
                    <div class="p-4 space-y-2">
                        <div class="skeleton h-4 w-3/4 rounded"></div>
                        <div class="skeleton h-3 w-1/2 rounded"></div>
                    </div>
                </div>
            `).join('');
            
            if (append) {
                resultsDiv.insertAdjacentHTML('beforeend', skeletons);
            } else {
                resultsDiv.innerHTML = skeletons;
            }
        }

        function startNewSearch() {
            // APIキーが空文字の場合の警告
            if (!apiKey) {
                alert("APIキーが設定されていません。コード内の apiKey 変数にキーを入力してください。");
                return;
            }
            currentPage = 1;
            document.getElementById('video-results').innerHTML = '';
            performSearch();
        }

        function loadMore() {
            currentPage++;
            performSearch(true);
        }

        async function fetchGeminiWithRetry(payload, retries = 5) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            let delay = 1000;

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) return await response.json();
                    
                    if (response.status === 429 || response.status >= 500) {
                        await new Promise(res => setTimeout(res, delay));
                        delay *= 2;
                        continue;
                    }
                    
                    const errData = await response.json();
                    throw new Error(errData.error?.message || `HTTP ${response.status}`);
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        }

        async function performSearch(append = false) {
            const btnLoader = document.getElementById('btn-loader');
            const moreLoader = document.getElementById('more-loader');
            const currentLoader = append ? moreLoader : btnLoader;
            
            const resultsDiv = document.getElementById('video-results');
            const status = document.getElementById('results-status');
            const emptyState = document.getElementById('empty-state');
            const loadMoreContainer = document.getElementById('load-more-container');

            setUILock(true);
            currentLoader.classList.remove('hidden');
            emptyState.classList.add('hidden');
            showSkeletons(append);
            
            if (!append) {
                status.textContent = '初期スキャン中...';
                loadMoreContainer.classList.add('hidden');
            } else {
                status.textContent = `${currentPage}ページ目をスキャン中...`;
            }

            let queryParts = Array.from(selectedTags);
            if (queryParts.length === 0) queryParts.push("新人歌い手");
            queryParts.push("歌ってみた");
            const customWord = document.getElementById('custom-word').value;
            if (customWord) queryParts.push(customWord);
            const searchQuery = queryParts.join(' ');

            const payload = {
                contents: [{ 
                    parts: [{ 
                        text: `Youtube for "${searchQuery}". Find exactly 10 unique videos for page ${currentPage}. Return JSON: { "videos": [{ "id": "videoId", "title": "title", "channel": "name" }] }` 
                    }] 
                }],
                tools: [{ "google_search": {} }],
                generationConfig: {
                    responseMimeType: "application/json",
                }
            };

            try {
                const data = await fetchGeminiWithRetry(payload);
                const rawContent = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!rawContent) throw new Error("応答が空です。");

                const parsed = JSON.parse(rawContent);
                const videoList = parsed.videos || [];
                
                document.querySelectorAll('.skeleton-item').forEach(el => el.remove());

                if (videoList.length === 0) {
                    if (!append) {
                        status.textContent = '見つかりませんでした。';
                        emptyState.classList.remove('hidden');
                    } else {
                        status.textContent = 'これ以上の結果はありません。';
                        loadMoreContainer.classList.add('hidden');
                    }
                } else {
                    status.textContent = `合計発見数: ${resultsDiv.children.length + videoList.length}件`;
                    
                    videoList.forEach(vid => {
                        const card = document.createElement('div');
                        card.className = 'video-card card rounded-xl overflow-hidden group shadow-lg flex flex-col transition-all duration-300 hover:border-red-500/50 hover:shadow-red-500/10';
                        const thumbUrl = `https://img.youtube.com/vi/${vid.id}/mqdefault.jpg`;

                        card.innerHTML = `
                            <a href="https://www.youtube.com/watch?v=${vid.id}" target="_blank" rel="noopener noreferrer" class="block relative aspect-video overflow-hidden bg-slate-900">
                                <img src="${thumbUrl}" alt="thumbnail" loading="lazy" class="w-full h-full object-cover transition-transform duration-500">
                                <div class="thumb-overlay absolute inset-0 bg-black/60 opacity-0 flex items-center justify-center transition-opacity duration-300">
                                    <div class="bg-red-600 p-2 rounded-full shadow-xl">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 6l6 6-6 6" />
                                        </svg>
                                    </div>
                                </div>
                            </a>
                            <div class="p-3">
                                <h3 class="text-xs font-bold line-clamp-2 mb-1 group-hover:text-red-400 transition-colors">${vid.title}</h3>
                                <p class="text-[10px] text-red-500 font-semibold truncate">${vid.channel || '新人歌い手'}</p>
                            </div>
                        `;
                        resultsDiv.appendChild(card);
                    });
                    loadMoreContainer.classList.remove('hidden');
                }
            } catch (error) {
                console.error("Error:", error);
                document.querySelectorAll('.skeleton-item').forEach(el => el.remove());
                status.textContent = `エラー: ${error.message}`;
                if (!append) {
                    document.getElementById('empty-text').textContent = "リロードして再度お試しください。";
                    emptyState.classList.remove('hidden');
                }
            } finally {
                setUILock(false);
                currentLoader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
