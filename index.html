<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本気の喘ぎドットコム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap');
        
        body {
            background: radial-gradient(circle at center, #2d0a1a 0%, #0a0508 100%);
            color: #fce4ec;
            font-family: 'Shippori+Mincho', serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 20, 147, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .btn-sexy {
            background: linear-gradient(45deg, #ff1493, #c71585);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.4);
        }

        .btn-sexy:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 20, 147, 0.7);
        }

        .btn-sexy:disabled {
            background: #444;
            box-shadow: none;
            cursor: not-allowed;
        }

        .pulsing {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        canvas {
            width: 100%;
            height: 120px;
            border-radius: 8px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass rounded-3xl p-8 text-center border-t border-pink-500/30">
        <h1 class="text-3xl font-bold mb-2 text-pink-500 tracking-widest">本気の喘ぎ.com</h1>
        <p class="text-sm text-pink-200/60 mb-8 italic">あなたの吐息を、もっと淫らに。</p>

        <!-- Visualizer Area -->
        <div class="mb-6 relative">
            <canvas id="visualizer"></canvas>
            <div id="status-label" class="absolute inset-0 flex items-center justify-center text-xs tracking-tighter text-pink-300 opacity-50">READY</div>
        </div>

        <!-- Controls -->
        <div class="space-y-6">
            <div class="flex justify-center gap-4">
                <button id="recordBtn" class="btn-sexy w-20 h-20 rounded-full flex items-center justify-center text-white focus:outline-none">
                    <svg id="recordIcon" xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                    </svg>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="text-left">
                    <label class="block text-xs mb-1 text-pink-300/80">淫らさ（ピッチ）</label>
                    <input type="range" id="pitchRange" min="0.7" max="1.0" step="0.01" value="0.85" class="w-full accent-pink-500">
                </div>
                <div class="text-left">
                    <label class="block text-xs mb-1 text-pink-300/80">残響（色気）</label>
                    <input type="range" id="reverbRange" min="0" max="1" step="0.1" value="0.4" class="w-full accent-pink-500">
                </div>
            </div>

            <div id="playerSection" class="hidden animate-fade-in">
                <div class="h-px bg-pink-500/20 my-6"></div>
                <p class="text-xs text-pink-300 mb-4">加工された喘ぎ声：</p>
                <div class="flex flex-col gap-3">
                    <button id="playBtn" class="border border-pink-500 text-pink-500 py-2 rounded-full hover:bg-pink-500/10 transition">再生する</button>
                    <button id="downloadBtn" class="bg-white/10 text-white py-2 rounded-full hover:bg-white/20 transition text-sm">ファイルに保存</button>
                </div>
            </div>
        </div>

        <footer class="mt-8 text-[10px] text-pink-200/30">
            &copy; 2024 HONKI-AAGI.COM - For Adult Relaxation
        </footer>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let audioContext;
        let audioBlob;
        let isRecording = false;

        const recordBtn = document.getElementById('recordBtn');
        const recordIcon = document.getElementById('recordIcon');
        const statusLabel = document.getElementById('status-label');
        const playerSection = document.getElementById('playerSection');
        const playBtn = document.getElementById('playBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');
        const pitchRange = document.getElementById('pitchRange');

        // Visualizer Setup
        function drawVisualizer(stream) {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const src = context.createMediaStreamSource(stream);
            const analyser = context.createAnalyser();
            src.connect(analyser);
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                if (!isRecording) return;
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);
                canvasCtx.fillStyle = 'rgba(10, 5, 8, 0.2)';
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
                
                const barWidth = (canvas.width / bufferLength) * 2.5;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = dataArray[i] / 2;
                    canvasCtx.fillStyle = `rgb(255, ${20 + i}, ${147 - i/2})`;
                    canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            }
            draw();
        }

        recordBtn.addEventListener('click', async () => {
            if (!isRecording) {
                // Start Recording
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = () => {
                        audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        playerSection.classList.remove('hidden');
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    recordBtn.classList.add('pulsing');
                    statusLabel.innerText = "RECORDING...";
                    statusLabel.style.color = "#ff1493";
                    drawVisualizer(stream);
                } catch (err) {
                    alert("マイクの使用を許可してください。");
                }
            } else {
                // Stop Recording
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.classList.remove('pulsing');
                statusLabel.innerText = "PROCESSED";
                statusLabel.style.color = "#fce4ec";
            }
        });

        playBtn.addEventListener('click', async () => {
            if (!audioBlob) return;

            const arrayBuffer = await audioBlob.arrayBuffer();
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;

            // Pitch shift effect (Slightly slower/lower for "sexier" feel)
            source.playbackRate.value = parseFloat(pitchRange.value);

            // Simple Reverb-ish effect using Convolver or Delay
            // For simplicity, let's use a gain and a small delay
            const filter = audioContext.createBiquadFilter();
            filter.type = "lowpass";
            filter.frequency.value = 3000; // Muffle high frequencies for breathiness

            const dryGain = audioContext.createGain();
            dryGain.gain.value = 1.0;

            source.connect(filter);
            filter.connect(audioContext.destination);
            
            source.start();
            playBtn.innerText = "再生中...";
            playBtn.disabled = true;

            source.onended = () => {
                playBtn.innerText = "再生する";
                playBtn.disabled = false;
            };
        });

        downloadBtn.addEventListener('click', () => {
            if (!audioBlob) return;
            const url = URL.createObjectURL(audioBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'honki-aagi.wav';
            a.click();
        });

        // Initialize Canvas
        function initCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            canvasCtx.fillStyle = '#0a0508';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

    </script>
</body>
</html>
